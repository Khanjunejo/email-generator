<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Email Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <!-- Google Sign-In -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --ink: #0f0f0f; --ink-soft: #444; --ink-muted: #888;
      --bg: #f7f6f2; --bg-panel: #ffffff; --bg-input: #f0efe9;
      --accent: #5b3cf5; --accent-dim: #ede9ff;
      --error: #d94f4f; --success: #1a9e6e;
      --border: #e2e1db; --radius: 12px; --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --font-display: 'Syne', sans-serif; --font-body: 'Inter', sans-serif;
      --transition: 0.2s ease;
    }
    [data-theme="dark"] {
      --ink: #f0efe9; --ink-soft: #bbb; --ink-muted: #666;
      --bg: #0e0e0e; --bg-panel: #1a1a1a; --bg-input: #242424;
      --accent: #7b5ef8; --accent-dim: #1e1840; --border: #2a2a2a;
      --shadow: 0 2px 16px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; transition: background var(--transition), color var(--transition); }

    header { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
    .logo { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; text-decoration: none; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .badge { background: var(--accent-dim); color: var(--accent); font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .theme-toggle { background: var(--bg-input); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1rem; transition: all var(--transition); }
    .theme-toggle:hover { background: var(--accent-dim); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-wrapper { width: 100%; max-width: 420px; }

    .auth-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px 36px 32px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .auth-header { text-align: center; margin-bottom: 28px; }
    .auth-icon { width: 48px; height: 48px; background: var(--accent-dim); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin: 0 auto 16px; }
    .auth-title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; color: var(--ink); letter-spacing: -0.5px; margin-bottom: 6px; }
    .auth-subtitle { font-size: 0.88rem; color: var(--ink-muted); }

    .google-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 11px 16px; background: var(--bg-input); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 0.88rem; font-weight: 500; color: var(--ink-soft); cursor: pointer; transition: all var(--transition); margin-bottom: 10px; }
    .google-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.75rem; color: var(--ink-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-muted); margin-bottom: 7px; }
    .field-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .field-row label { margin-bottom: 0; }
    .forgot-link { font-size: 0.78rem; font-weight: 500; color: var(--accent); text-decoration: none; }
    .forgot-link:hover { opacity: 0.75; }

    .input-wrap { position: relative; }
    .input-wrap input { width: 100%; background: var(--bg-input); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-family: var(--font-body); font-size: 0.9rem; color: var(--ink); outline: none; transition: border-color var(--transition); }
    .input-wrap input:focus { border-color: var(--accent); background: var(--bg-panel); }
    .input-wrap input.error-field { border-color: var(--error); }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-muted); font-size: 0.95rem; transition: color var(--transition); }
    .toggle-pw:hover { color: var(--accent); }

    .error-msg { font-size: 0.76rem; color: var(--error); margin-top: 5px; display: none; }
    .error-msg.show { display: block; }

    .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .remember-row input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .remember-row label { font-size: 0.83rem; color: var(--ink-soft); cursor: pointer; }

    .btn-submit { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font-display); font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity var(--transition), transform var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-submit .loader { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn-submit.loading .loader { display: block; }
    .btn-submit.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .server-error { background: #fee2e2; border: 1px solid #fca5a5; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 0.83rem; color: var(--error); margin-bottom: 16px; display: none; }
    .server-error.show { display: block; }

    .auth-footer { text-align: center; margin-top: 22px; font-size: 0.85rem; color: var(--ink-muted); }
    .auth-footer a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { opacity: 0.75; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) { .auth-card { padding: 28px 20px 24px; } }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">✦ Email Generator</a>
  <div class="header-right">
    <span class="badge">AI Powered</span>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>
</header>

<main>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">✦</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue generating emails</p>
      </div>

      <div class="server-error" id="serverError"></div>

      <!-- Google Sign In -->
      <button class="google-btn" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="error-msg" id="emailError">Please enter a valid email address.</div>
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <button class="toggle-pw" id="togglePw" type="button">👁️</button>
        </div>
        <div class="error-msg" id="passwordError">Password is required.</div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Remember me for 30 days</label>
      </div>

      <button class="btn-submit" id="loginBtn">
        <span class="btn-label">Sign In ✦</span>
        <span class="loader"></span>
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="/signup">Create one free</a>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // Theme
  const savedTheme = localStorage.getItem("theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  const themeToggle = document.getElementById("themeToggle");
  themeToggle.textContent = savedTheme === "dark" ? "☀️" : "🌙";
  themeToggle.addEventListener("click", () => {
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    themeToggle.textContent = next === "dark" ? "☀️" : "🌙";
    localStorage.setItem("theme", next);
  });

  // Toast
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  // Password toggle
  document.getElementById("togglePw").addEventListener("click", () => {
    const p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
  });

  // Server error
  function showServerError(msg) {
    const el = document.getElementById("serverError");
    el.textContent = msg; el.classList.add("show");
  }
  function hideServerError() {
    document.getElementById("serverError").classList.remove("show");
  }

  // Validate
  function validate() {
    let ok = true;
    hideServerError();
    const email = document.getElementById("email");
    const pw    = document.getElementById("password");
    document.getElementById("emailError").classList.remove("show");
    document.getElementById("passwordError").classList.remove("show");
    email.classList.remove("error-field");
    pw.classList.remove("error-field");

    if (!email.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
      document.getElementById("emailError").classList.add("show");
      email.classList.add("error-field"); ok = false;
    }
    if (!pw.value) {
      document.getElementById("passwordError").classList.add("show");
      pw.classList.add("error-field"); ok = false;
    }
    return ok;
  }

  // Login
  document.getElementById("loginBtn").addEventListener("click", async () => {
    if (!validate()) return;
    const btn = document.getElementById("loginBtn");
    btn.classList.add("loading"); btn.disabled = true;
    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: document.getElementById("email").value, password: document.getElementById("password").value })
      });
      const data = await res.json();
      if (data.success) { showToast("Welcome back! ✦"); setTimeout(() => window.location.href = "/", 800); }
      else { showServerError(data.error || "Login failed"); }
    } catch (e) { showServerError("Could not connect. Is Flask running?"); }
    finally { btn.classList.remove("loading"); btn.disabled = false; }
  });

  document.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });

  // Google Sign-In
  document.getElementById("googleBtn").addEventListener("click", () => {
    // Simulate Google login for demo — replace with real Google OAuth client ID
    const mockUser = { name: "Google User", email: "googleuser@gmail.com" };
    fetch("/api/google-auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(mockUser)
    }).then(r => r.json()).then(data => {
      if (data.success) { showToast("Signed in with Google! ✦"); setTimeout(() => window.location.href = "/", 800); }
      else showToast("Google sign-in failed");
    });
  });

  // Real Google OAuth (uncomment and add your Client ID):
  // window.onload = function() {
  //   google.accounts.id.initialize({
  //     client_id: "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com",
  //     callback: async (response) => {
  //       const payload = JSON.parse(atob(response.credential.split('.')[1]));
  //       const res = await fetch("/api/google-auth", {
  //         method: "POST", headers: { "Content-Type": "application/json" },
  //         body: JSON.stringify({ name: payload.name, email: payload.email })
  //       });
  //       const data = await res.json();
  //       if (data.success) window.location.href = "/";
  //     }
  //   });
  // };
</script>
</body>
</html>
