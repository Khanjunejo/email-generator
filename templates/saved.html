<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Emails — Email Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#0f0f0f;--ink-soft:#444;--ink-muted:#888;--bg:#f7f6f2;--bg-panel:#ffffff;--bg-input:#f0efe9;--accent:#5b3cf5;--accent-dim:#ede9ff;--success:#1a9e6e;--error:#d94f4f;--border:#e2e1db;--radius:12px;--radius-sm:8px;--shadow:0 2px 16px rgba(0,0,0,0.07);--font-display:'Syne',sans-serif;--font-body:'Inter',sans-serif;--transition:0.2s ease;}
    [data-theme="dark"]{--ink:#f0efe9;--ink-soft:#bbb;--ink-muted:#666;--bg:#0e0e0e;--bg-panel:#1a1a1a;--bg-input:#242424;--accent:#7b5ef8;--accent-dim:#1e1840;--border:#2a2a2a;--shadow:0 2px 16px rgba(0,0,0,0.4);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;transition:background var(--transition),color var(--transition);}
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--bg-panel);position:sticky;top:0;z-index:100;}
    .logo{font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--accent);letter-spacing:-0.5px;text-decoration:none;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .back-btn{padding:7px 14px;border-radius:20px;font-size:0.82rem;font-weight:600;text-decoration:none;border:1.5px solid var(--border);color:var(--ink-soft);transition:all var(--transition);}
    .back-btn:hover{border-color:var(--accent);color:var(--accent);}
    .theme-toggle{background:var(--bg-input);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1rem;}
    .page-wrap{max-width:900px;margin:0 auto;padding:32px 24px;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .page-title{font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--ink);}
    .page-count{font-size:0.85rem;color:var(--ink-muted);}
    .search-bar{width:100%;background:var(--bg-panel);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;font-family:var(--font-body);font-size:0.9rem;color:var(--ink);outline:none;margin-bottom:20px;transition:border-color var(--transition);}
    .search-bar:focus{border-color:var(--accent);}
    .empty-saved{text-align:center;padding:60px 20px;color:var(--ink-muted);}
    .empty-saved-icon{font-size:3rem;margin-bottom:16px;}
    .empty-saved p{font-size:0.95rem;line-height:1.7;}
    .empty-saved a{color:var(--accent);font-weight:600;text-decoration:none;}
    .saved-grid{display:grid;gap:14px;}
    .saved-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .saved-card-header{padding:14px 18px;background:var(--bg-input);display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .saved-card-subject{font-weight:700;font-size:0.95rem;color:var(--ink);flex:1;}
    .saved-card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .meta-tag{font-size:0.7rem;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--accent-dim);color:var(--accent);}
    .meta-tag.lang{background:#e8f5e9;color:#2e7d32;}
    .saved-card-body{padding:16px 18px;font-size:0.88rem;line-height:1.8;color:var(--ink-soft);white-space:pre-wrap;max-height:160px;overflow:hidden;position:relative;}
    .saved-card-body.expanded{max-height:none;}
    .fade-overlay{position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent, var(--bg-panel));pointer-events:none;}
    .fade-overlay.hidden{display:none;}
    .saved-card-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
    .saved-time{font-size:0.73rem;color:var(--ink-muted);}
    .saved-actions{display:flex;gap:6px;}
    .btn-sm{padding:5px 12px;border-radius:20px;font-size:0.76rem;font-weight:600;border:1.5px solid var(--border);background:var(--bg-input);color:var(--ink-soft);cursor:pointer;transition:all var(--transition);font-family:var(--font-body);}
    .btn-sm:hover{border-color:var(--accent);color:var(--accent);}
    .btn-sm.expand{border-color:var(--accent);color:var(--accent);}
    .btn-sm.delete{color:var(--error);border-color:var(--error);}
    .btn-sm.delete:hover{background:var(--error);color:#fff;}
    .btn-sm.whatsapp{color:#128c3e;border-color:#25d366;}
    .btn-sm.whatsapp:hover{background:#25d366;color:#fff;}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:0.83rem;font-weight:500;opacity:0;pointer-events:none;transition:all 0.3s ease;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .loading-state{text-align:center;padding:40px;color:var(--ink-muted);font-size:0.9rem;}
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">✦ Email Generator</a>
  <div class="header-right">
    <a href="/" class="back-btn">← Back to Generator</a>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>
</header>

<div class="page-wrap">
  <div class="page-header">
    <div>
      <div class="page-title">💾 Saved Emails</div>
      <div class="page-count" id="pageCount">Loading...</div>
    </div>
  </div>

  <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Search saved emails by subject or content...">

  <div id="savedContainer"><div class="loading-state">Loading your saved emails...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // THEME
  const savedTheme = localStorage.getItem("theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  const themeToggle = document.getElementById("themeToggle");
  themeToggle.textContent = savedTheme === "dark" ? "☀️" : "🌙";
  themeToggle.addEventListener("click", () => {
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    themeToggle.textContent = next === "dark" ? "☀️" : "🌙";
    localStorage.setItem("theme", next);
  });

  const toast = document.getElementById("toast");
  function showToast(msg) {
    toast.textContent = msg; toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2500);
  }

  let allEmails = [];

  async function loadSaved() {
    try {
      const res  = await fetch("/api/get-saved");
      const data = await res.json();
      if (!data.success) { showToast("Could not load saved emails"); return; }
      allEmails = data.emails;
      renderEmails(allEmails);
    } catch(e) { showToast("Error loading emails"); }
  }

  function renderEmails(emails) {
    const container = document.getElementById("savedContainer");
    document.getElementById("pageCount").textContent = `${emails.length} email${emails.length !== 1 ? "s" : ""} saved`;

    if (emails.length === 0) {
      container.innerHTML = `<div class="empty-saved"><div class="empty-saved-icon">💾</div><p>No saved emails yet.<br><a href="/">Generate your first email</a> and click Save!</p></div>`;
      return;
    }

    container.innerHTML = "";
    const grid = document.createElement("div");
    grid.className = "saved-grid";

    emails.forEach(email => {
      const card = document.createElement("div");
      card.className = "saved-card";
      card.innerHTML = `
        <div class="saved-card-header">
          <div class="saved-card-subject">${email.subject || "No Subject"}</div>
          <div class="saved-card-meta">
            <span class="meta-tag">${email.type || "Professional"}</span>
            <span class="meta-tag">${email.tone || "Formal"}</span>
            <span class="meta-tag lang">${email.language || "English"}</span>
          </div>
        </div>
        <div class="saved-card-body" id="body-${email.id}">${email.body}
          <div class="fade-overlay" id="overlay-${email.id}"></div>
        </div>
        <div class="saved-card-footer">
          <span class="saved-time">🕒 ${email.saved_at}</span>
          <div class="saved-actions">
            <button class="btn-sm expand" onclick="toggleExpand('${email.id}')">▼ Read more</button>
            <button class="btn-sm" onclick="copyEmail('${email.id}', \`${escapeForJS(email.subject)}\`, \`${escapeForJS(email.body)}\`)">📋 Copy</button>
            <button class="btn-sm whatsapp" onclick="shareWhatsApp(\`${escapeForJS(email.subject)}\`, \`${escapeForJS(email.body)}\`)">💬 WhatsApp</button>
            <button class="btn-sm delete" onclick="deleteEmail('${email.id}', this)">🗑 Delete</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
    container.appendChild(grid);
  }

  function escapeForJS(str) {
    return (str || "").replace(/\\/g,"\\\\").replace(/`/g,"\\`").replace(/\$/g,"\\$");
  }

  function toggleExpand(id) {
    const body    = document.getElementById("body-"+id);
    const overlay = document.getElementById("overlay-"+id);
    const btn     = body.parentElement.querySelector(".expand");
    if (body.classList.toggle("expanded")) {
      btn.textContent = "▲ Show less";
      overlay.classList.add("hidden");
    } else {
      btn.textContent = "▼ Read more";
      overlay.classList.remove("hidden");
    }
  }

  function copyEmail(id, subject, body) {
    navigator.clipboard.writeText(`Subject: ${subject}\n\n${body}`);
    showToast("Email copied! ✓");
  }

  function shareWhatsApp(subject, body) {
    const text = `📧 *${subject}*\n\n${body}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
    showToast("Opening WhatsApp! 💬");
  }

  async function deleteEmail(id, btn) {
    if (!confirm("Delete this saved email?")) return;
    try {
      const res  = await fetch(`/api/delete-email/${id}`, { method:"DELETE" });
      const data = await res.json();
      if (data.success) {
        allEmails = allEmails.filter(e => e.id !== id);
        renderEmails(allEmails);
        showToast("Email deleted ✓");
      }
    } catch(e) { showToast("Could not delete"); }
  }

  // SEARCH
  document.getElementById("searchBar").addEventListener("input", function() {
    const q = this.value.toLowerCase();
    const filtered = allEmails.filter(e =>
      (e.subject||"").toLowerCase().includes(q) ||
      (e.body||"").toLowerCase().includes(q)
    );
    renderEmails(filtered);
  });

  loadSaved();
</script>
</body>
</html>
